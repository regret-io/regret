apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "regret.fullname" . }}
  labels:
    {{- include "regret.labels" . | nindent 4 }}
rules:
  # Pilot only needs to read pods for adapter discovery (optional)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
