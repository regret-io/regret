syntax = "proto3";
package regret.v1;

service AdapterService {
    // Bidirectional stream for executing operations.
    // Pilot streams ops and fences, adapter streams results and fence acks.
    rpc Execute(stream ExecuteRequest) returns (stream ExecuteResponse);

    // Read all records under a key prefix (checkpoint verification).
    rpc ReadState(ReadStateRequest) returns (ReadStateResponse);

    // Delete all data under a key prefix (hypothesis deletion).
    rpc Cleanup(CleanupRequest) returns (CleanupResponse);
}

message ExecuteRequest {
    oneof request {
        Operation op = 1;
        Fence fence = 2;
    }
}

message ExecuteResponse {
    oneof response {
        OpResult result = 1;
        FenceAck fence_ack = 2;
    }
}

message Operation {
    string op_id   = 1;
    string op_type = 2;
    bytes  payload = 3;
}

message Fence {
    uint64 fence_id = 1;
}

message FenceAck {
    uint64 fence_id = 1;
}

message OpResult {
    string op_id   = 1;
    string status  = 2;
    bytes  payload = 3;
    string message = 4;
}

message ReadStateRequest {
    string key_prefix = 1;
}

message ReadStateResponse {
    repeated Record records = 1;
}

message Record {
    string              key      = 1;
    optional bytes      value    = 2;
    map<string, string> metadata = 3;
}

message CleanupRequest {
    string key_prefix = 1;
}

message CleanupResponse {}
