syntax = "proto3";
package regret.v1;

service AdapterService {
    // Execute a batch of operations. Ops within a batch execute concurrently.
    rpc ExecuteBatch(BatchRequest) returns (BatchResponse);

    // Read all records under a key prefix (checkpoint verification).
    rpc ReadState(ReadStateRequest) returns (ReadStateResponse);

    // Delete all data under a key prefix (hypothesis deletion).
    rpc Cleanup(CleanupRequest) returns (CleanupResponse);
}

message BatchRequest {
    string            batch_id = 1;
    repeated Operation ops     = 2;
}

message Operation {
    string op_id   = 1;
    string op_type = 2;
    bytes  payload = 3;
}

message BatchResponse {
    string           batch_id = 1;
    repeated OpResult results = 2;
}

message OpResult {
    string op_id   = 1;
    string status  = 2;
    bytes  payload = 3;
    string message = 4;
}

message ReadStateRequest {
    string key_prefix = 1;
}

message ReadStateResponse {
    repeated Record records = 1;
}

message Record {
    string              key      = 1;
    optional bytes      value    = 2;
    map<string, string> metadata = 3;
}

message CleanupRequest {
    string key_prefix = 1;
}

message CleanupResponse {}
