name: Build & Push Images

on:
  push:
    branches: [main]
    paths:
      - 'pilot/**'
      - 'proto/**'
      - 'studio/**'
      - 'adapters/**'
      - 'sdk/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'regret.proto'
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        type: choice
        default: 'debug'
        options:
          - debug
          - release
      components:
        description: 'Components to build (space-separated)'
        default: 'pilot studio adapter'

permissions:
  contents: read
  packages: write

jobs:
  pilot:
    name: Build Pilot
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      contains(inputs.components || 'pilot', 'pilot')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: pilot/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: BUILD_MODE=${{ inputs.build_mode || 'debug' }}
          tags: regretio/pilot:latest
          cache-from: type=gha,scope=pilot
          cache-to: type=gha,scope=pilot,mode=max

  studio:
    name: Build Studio
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      contains(inputs.components || 'studio', 'studio')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: studio
          platforms: linux/amd64
          push: true
          tags: regretio/studio:latest
          cache-from: type=gha,scope=studio
          cache-to: type=gha,scope=studio,mode=max

  adapter:
    name: Build Oxia Adapter
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      contains(inputs.components || 'adapter', 'adapter')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: adapters/oxia-java/Dockerfile
          platforms: linux/amd64
          push: true
          tags: regretio/adapter-oxia:latest
          cache-from: type=gha,scope=adapter
          cache-to: type=gha,scope=adapter,mode=max
