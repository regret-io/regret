name: Build & Push Pilot

on:
  push:
    branches: [main]
    paths:
      - 'pilot/**'
      - 'proto/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'regret.proto'
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        type: choice
        default: 'debug'
        options:
          - debug
          - release

permissions:
  contents: read
  packages: write

jobs:
  pilot:
    name: Build Pilot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: pilot/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: BUILD_MODE=${{ inputs.build_mode || 'debug' }}
          tags: regretio/pilot:latest
          cache-from: type=gha,scope=pilot
          cache-to: type=gha,scope=pilot,mode=max
