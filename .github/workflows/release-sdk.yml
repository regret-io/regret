name: Release Java SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Release SDK v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build SDK
        run: ./gradlew :sdk:java:build

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "sdk-java-v${{ inputs.version }}" -m "Java SDK v${{ inputs.version }}"
          git push origin "sdk-java-v${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "sdk-java-v${{ inputs.version }}"
          name: "Java SDK v${{ inputs.version }}"
          body: |
            ## Java SDK v${{ inputs.version }}

            ### JitPack
            ```gradle
            repositories {
                maven { url 'https://jitpack.io' }
            }
            dependencies {
                implementation 'com.github.regret-io.regret:sdk-java:sdk-java-v${{ inputs.version }}'
            }
            ```

      - name: Trigger JitPack build
        run: |
          curl -s "https://jitpack.io/com/github/regret-io/regret/sdk-java/sdk-java-v${{ inputs.version }}/sdk-java-sdk-java-v${{ inputs.version }}.pom" || true
          echo "JitPack build triggered for sdk-java-v${{ inputs.version }}"
