name: Release Java SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release SDK v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Set version
        run: |
          sed -i "s/version = .*/version = \"${{ inputs.version }}\"/" build.gradle.kts

      - name: Build SDK
        run: ./gradlew :sdk:java:build

      - name: Publish to GitHub Packages
        run: ./gradlew :sdk:java:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "sdk-java-v${{ inputs.version }}" -m "Java SDK v${{ inputs.version }}"
          git push origin "sdk-java-v${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "sdk-java-v${{ inputs.version }}"
          name: "Java SDK v${{ inputs.version }}"
          body: |
            ## Java SDK v${{ inputs.version }}

            ### GitHub Packages (Maven)
            ```gradle
            repositories {
                maven {
                    url = uri("https://maven.pkg.github.com/regret-io/regret")
                    credentials {
                        username = System.getenv("GITHUB_ACTOR") ?: project.findProperty("gpr.user") as String?
                        password = System.getenv("GITHUB_TOKEN") ?: project.findProperty("gpr.key") as String?
                    }
                }
            }
            dependencies {
                implementation("io.regret:regret-adapter-sdk-java:${{ inputs.version }}")
            }
            ```
